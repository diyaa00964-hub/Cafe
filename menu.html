<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المنيو والسلة</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f1de; color: #333; margin: 0; padding: 20px; }
        header { background: #3d2b1f; color: white; padding: 15px; text-align: center; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; }
        .menu-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 20px; }
        .item-card { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); text-align: center; }
        .item-card h3 { margin: 10px 0; color: #3d2b1f; }
        .price { color: #e07a5f; font-weight: bold; font-size: 1.2rem; }
        .btn-add { background: #81b29a; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; margin-top: 10px; }
        
        /* السلة */
        .cart-section { background: white; padding: 20px; border-radius: 10px; margin-top: 40px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .cart-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #ddd; }
        .btn-order { background: #e07a5f; color: white; border: none; padding: 12px 25px; border-radius: 5px; cursor: pointer; width: 100%; font-size: 1.1rem; margin-top: 15px; }
    </style>
</head>
<body>

<header>
    <h2>منيو المقهى ☕</h2>
    <div>العناصر في السلة: <span id="cart-count">0</span></div>
</header>

<!-- المنيو -->
<div class="menu-container">
    <div class="item-card">
        <h3>اسبريسو</h3>
        <p class="price">3.00 $</p>
        <button class="btn-add" onclick="addToCart('اسبريسو', 3.00)">إضافة للسلة</button>
    </div>
    <div class="item-card">
        <h3>كابوتشينو</h3>
        <p class="price">4.50 $</p>
        <button class="btn-add" onclick="addToCart('كابوتشينو', 4.50)">إضافة للسلة</button>
    </div>
    <div class="item-card">
        <h3>لاتيه بارد</h3>
        <p class="price">5.00 $</p>
        <button class="btn-add" onclick="addToCart('لاتيه بارد', 5.00)">إضافة للسلة</button>
    </div>
</div>

<!-- صفحة/قسم السلة المخصص -->
<div class="cart-section">
    <h3>🛒 سلة المشتريات الخاص بك</h3>
    <div id="cart-items">
        <!-- تظهر العناصر المضافة هنا -->
    </div>
    <h4 style="text-align: left;">المجموع الكلي: <span id="total-price">0.00</span> $</h4>
    <button class="btn-order" onclick="sendOrder()">تأكيد وإرسال الطلب للإدارة</button>
</div>

<script>
    let cart = [];

    function addToCart(name, price) {
        cart.push({name, price});
        updateCartUI();
    }

    function updateCartUI() {
        document.getElementById('cart-count').innerText = cart.length;
        const cartItemsDiv = document.getElementById('cart-items');
        cartItemsDiv.innerHTML = '';
        
        let total = 0;
        cart.forEach((item, index) => {
            total += item.price;
            cartItemsDiv.innerHTML += `
                <div class="cart-item">
                    <span>${item.name}</span>
                    <span>${item.price} $</span>
                </div>
            `;
        });
        document.getElementById('total-price').innerText = total.toFixed(2);
    }

    function sendOrder() {
        if(cart.length === 0) {
            alert("السلة فارغة!");
            return;
        }
        
        // تجهيز نص الطلب لشحن البيانات لموقع الإدارة أو الواتساب
        let orderText = "طلب جديد من الموقع:\n";
        cart.forEach(item => {
            orderText += `- ${item.name} (${item.price} $)\n`;
        });
        orderText += `المجموع: ${document.getElementById('total-price').innerText} $`;

        // حفظ الطلب محلياً ليقرأه موقع الإدارة (طريقة الربط البسيطة بدون سيرفر)
        let allOrders = JSON.parse(localStorage.getItem('orders')) || [];
        allOrders.push({
            id: Date.now(),
            details: orderText,
            time: new Date().toLocaleTimeString()
        });
        localStorage.setItem('orders', JSON.stringify(allOrders));

        alert("تم إرسال طلبك بنجاح للإدارة!");
        cart = [];
        updateCartUI();
    }
</script>
</body>
</html>
